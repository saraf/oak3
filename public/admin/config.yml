local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

# Use Netlify Identity for authentication
publish_mode: editorial_workflow

collections:

  # ── BLOG ARTICLES ──────────────────────────────────────────────────────────
  - name: articles
    label: Blog Articles
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title,      name: title,      widget: string }
      - { label: Date,       name: date,       widget: string,   hint: "e.g. Mar 01, 2025" }
      - { label: Category,   name: category,   widget: select,
          options: [Seasonal Wellness, Daily Routine, Herbs & Oils, Doshas, Recipes, Lifestyle] }
      - { label: Excerpt,    name: excerpt,    widget: text,     hint: "One-sentence summary shown on the blog listing page." }
      - { label: Symbol,     name: symbol,     widget: string,   default: "🌿", hint: "Emoji shown on the blog card." }
      - { label: Background, name: bgGradient, widget: string,
          default: "linear-gradient(135deg, #1c3526, #3d6b50)",
          hint: "CSS gradient for the card image, e.g. linear-gradient(135deg, #1c3526, #3d6b50)" }
      - { label: Body,       name: body,       widget: markdown }

  # ── NEWS ───────────────────────────────────────────────────────────────────
  - name: news
    label: News Items
    folder: src/content/news
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Date,  name: date,  widget: string, hint: "Format: YYYY.MM.DD e.g. 2025.03.01" }
      - { label: Tag,   name: tag,   widget: select, options: [news, seminar, blog] }
      - { label: Title, name: title, widget: string }
      - { label: Link,  name: href,  widget: string, required: false,
          hint: "Optional internal link e.g. /seminars or /blog/spring-detox" }

  # ── SEMINARS ───────────────────────────────────────────────────────────────
  - name: seminars
    label: Seminars
    folder: src/content/seminars
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title,    name: title,    widget: string }
      - { label: Date,     name: date,     widget: string, hint: "e.g. April 12, 2025  9:30–16:30" }
      - { label: Status,   name: status,   widget: select, options: [open, soon, full] }
      - { label: Format,   name: format,   widget: string, hint: "e.g. In-person · Osaka  or  Online (Zoom)" }
      - { label: Capacity, name: capacity, widget: string, required: false, hint: "e.g. 12 seats" }
      - { label: Registration Deadline, name: deadline, widget: string, required: false, hint: "e.g. April 5, 2025" }
      - { label: Fee,      name: fee,      widget: string, required: false, hint: "e.g. Members ¥3,000 · Non-members ¥4,000" }

      - label: Venue
        name: venue
        widget: object
        required: false
        fields:
          - { label: Venue Name,        name: name,    widget: string }
          - { label: Address,           name: address, widget: string, required: false }
          - { label: Transport / Access, name: access, widget: string, required: false,
              hint: "e.g. 3 min walk from Tenjinbashisuji-rokuchome Station" }

      - label: Speakers
        name: speakers
        widget: list
        required: false
        fields:
          - { label: Name,       name: name,  widget: string }
          - { label: Title/Role, name: title, widget: string, required: false }
          - { label: Biography,  name: bio,   widget: text,   required: false }

      - label: Flyer Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }

      - label: PDF Downloads
        name: pdfs
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string, hint: "e.g. Spring Detox 2025 Flyer" }
          - { label: File,  name: file,  widget: file }

      - { label: Body, name: body, widget: markdown }

 # ── COURSES ────────────────────────────────────────────────────────────────
  - name: courses
    label: Courses
    folder: src/content/courses
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title,    name: title,    widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - { label: Category, name: category, widget: select,
          options: [regular, specialist, oneday] }
      - { label: Schedule, name: schedule, widget: string,
          hint: "e.g. Monthly start · 6 sessions per term" }
      - { label: Duration, name: duration, widget: string,
          hint: "e.g. 6 sessions · 90 min lecture + 40 min practical" }
      - { label: Location, name: location, widget: string }
      - { label: Status,   name: status,   widget: select,
          options: [open, full, enquire] }
      - { label: Fee,         name: fee,         widget: string, required: false }
      - { label: Certificate, name: certificate, widget: string, required: false }
      - label: Lecturers
        name: lecturers
        widget: list
        required: false
        fields:
          - { label: Name,        name: name,        widget: string }
          - { label: Credentials, name: credentials, widget: string, required: false }
          - { label: Biography,   name: bio,         widget: text,   required: false }
      - label: Venue
        name: venue
        widget: object
        required: false
        fields:
          - { label: Venue Name, name: name,    widget: string }
          - { label: Address,    name: address, widget: string, required: false }
          - { label: Access,     name: access,  widget: string, required: false }
      - label: Syllabus
        name: syllabus
        widget: list
        required: false
        field: { label: Topic, name: topic, widget: string }
      - label: Images
        name: images
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - label: PDF Downloads
        name: pdfs
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: File,  name: file,  widget: file }
      - { label: Body, name: body, widget: markdown }

  # ── GALLERY ────────────────────────────────────────────────────────────────
  - name: gallery
    label: Photo Gallery
    folder: src/content/gallery
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title,       name: title,       widget: string }
      - { label: Date,        name: date,        widget: datetime, format: "YYYY-MM-DD",
          hint: "Date of the event" }
      - { label: Category,    name: category,    widget: select,
          options: [seminar, india, workshop, cultural] }
      - { label: Description, name: description, widget: text,
          hint: "1–2 sentence summary shown on the gallery index card." }
      - { label: Cover Image, name: coverImage,  widget: image, required: false,
          hint: "The image shown on the gallery index. If blank, the first photo is used." }

      - label: "Related Page (optional)"
        name: relatedType
        widget: select
        required: false
        options: [seminar, course]
        hint: "Is this event linked to a seminar or course page?"
      - { label: Related Slug, name: relatedSlug, widget: string, required: false,
          hint: "The slug of the related seminar or course e.g. spring-detox or ayurveda-talk" }
      - { label: Related Link Label, name: relatedLabel, widget: string, required: false,
          hint: "e.g. Spring Detox & Kapha Cleanse — view seminar details" }

      - label: Photos
        name: images
        widget: list
        fields:
          - { label: Photo,   name: file,    widget: image }
          - { label: Caption, name: caption, widget: string,   required: false,
              hint: "Short English description of what is happening in the photo." }
          - { label: Alt Text, name: alt,    widget: string,   required: false,
              hint: "Accessibility description. If blank, caption is used." }

      - { label: "Event notes (optional)", name: body, widget: markdown, required: false,
          hint: "Optional longer description shown below the photo grid." }
